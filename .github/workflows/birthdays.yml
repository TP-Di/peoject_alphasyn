name: Daily birthdays

on:
  schedule:
    - cron: "13 2 * * *"  # 07:13 Asia/Tashkent (UTC+5). Запас в ~2 часа до желаемых 09:00 на случай задержки GHA scheduled-триггера; не на :00 чтобы не попадать в peak-окно.
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest
    environment: prod
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - run: python main.py
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_GROUP_ID: ${{ secrets.TG_GROUP_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_SA_JSON: ${{ secrets.GOOGLE_SA_JSON }}
          GOOGLE_ID: ${{ secrets.GOOGLE_ID }}
